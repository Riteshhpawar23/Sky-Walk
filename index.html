<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Cache-Control" content="no-cache">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

        <title>SKY-Walk</title>

        <style>
            /* Basic styles for the page and canvas */
            * {
                user-select: none;
            }

            html, body {
                overflow: hidden;
                background-color: #000;
            }

            body {
                margin: 0;
                position: fixed;
                width: 100%;
                height: 100%;
            }

            canvas {
                width: 100%;
                height: 100%;
            }

            /* Styles for the control panel (if any is added by the script) */
            .dg {
                opacity: 0.9;
            }

            .dg .property-name {
                overflow: visible;
            }

            .bigFont {
                font-size: 150%;
                color: #8C8C8C;
            }
        </style>
    </head>
    <body>
        <!-- The canvas is where the fluid simulation will be rendered -->
        <canvas></canvas>

        <!-- The script that runs the fluid simulation -->
        <script src="./script.js"></script>
    </body>
</html>
